name: deploy-book

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for manually running the deploy book workflow
        required: True
        default: ''

env:
  BASE_URL: /${{ github.event.repository.name }}

# This job installs dependencies, builds the book #TODO: and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
      - name: Python info
        run: |
          which python
          python --version

      - name: Install Sphinx docs dependencies
        run: |
          pip install sphinx sphinx-book-theme myst-nb sphinxcontrib-bibtex

      - name: Show pip list
        run: |
          pip list

      - name: Build the book
        run: |
          sphinx-build -E -a -b html . _build/html

      # Push the book's HTML to github-pages
      - name: GitHub Pages action
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
